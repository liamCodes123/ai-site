<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Secure AI Chat</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    .chat-box {
      background: white;
      border-radius: 10px;
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .user { text-align: right; margin: 8px 0; }
    .assistant { text-align: left; margin: 8px 0; }

    .bubble {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 15px;
      max-width: 75%;
    }

    .user .bubble { background: #007bff; color: white; }
    .assistant .bubble { background: #e5e5ea; }

    .input-area { display: flex; gap: 10px; }
    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #0056b3; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [message, setMessage] = useState("");
      const [chat, setChat] = useState([]);
      const [loading, setLoading] = useState(false);

      async function sendMessage() {
        if (!message.trim() || loading) return;

        const newChat = [...chat, { role: "user", content: message }];
        setChat(newChat);
        setMessage("");
        setLoading(true);

        try {
          // 🔹 CHANGE THIS URL to your Netlify function URL
          const response = await fetch(
            "https://securai-beta.netlify.app/.netlify/functions/chat",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ messages: newChat })
            }
          );

          const data = await response.json();
          const aiReply = data.choices[0].message;

          setChat([...newChat, aiReply]);
        } catch (error) {
          setChat([...newChat, { role: "assistant", content: "Error connecting to server." }]);
        }

        setLoading(false);
      }

      return (
        <div>
          <h1>Secure AI Chat</h1>

          <div className="chat-box">
            {chat.map((msg, i) => (
              <div key={i} className={msg.role}>
                <div className="bubble">{msg.content}</div>
              </div>
            ))}
            {loading && (
              <div className="assistant">
                <div className="bubble">Typing...</div>
              </div>
            )}
          </div>

          <div className="input-area">
            <input
              value={message}
              onChange={e => setMessage(e.target.value)}
              placeholder="Type a message..."
              onKeyDown={e => e.key === "Enter" && sendMessage()}
            />
            <button onClick={sendMessage}>Send</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
